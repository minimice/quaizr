<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e8e3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbc04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f29900;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9334e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7627bb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#5f6368" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#202124">
    QuAIzR - Cloud-Native Architecture
  </text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5f6368">
    AI-Powered Quiz System with Google ADK + Gemini 2.5 Flash Lite
  </text>
  
  <!-- Layer Labels -->
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5f6368">PRESENTATION</text>
  <text x="30" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5f6368">APPLICATION</text>
  <text x="30" y="570" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5f6368">DATA</text>
  <text x="30" y="750" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5f6368">EXTERNAL</text>
  
  <!-- Presentation Layer -->
  <rect x="150" y="100" width="900" height="140" rx="10" fill="white" stroke="#dadce0" stroke-width="2"/>
  
  <!-- User -->
  <circle cx="240" cy="170" r="35" fill="url(#blueGrad)"/>
  <text x="240" y="175" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="white">👤</text>
  <text x="240" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#202124">User</text>
  
  <!-- Streamlit UI -->
  <rect x="380" y="130" width="220" height="90" rx="8" fill="url(#blueGrad)"/>
  <text x="490" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Streamlit UI</text>
  <text x="490" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Quiz Interface</text>
  <text x="490" y="195" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Session Management</text>
  <text x="490" y="210" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Query Params State</text>
  
  <!-- State Management -->
  <rect x="680" y="130" width="200" height="90" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="780" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a73e8">State Management</text>
  <text x="780" y="180" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">• current_q, score</text>
  <text x="780" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">• hint_text, show_hint</text>
  <text x="780" y="210" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">• hint_feedback[]</text>
  
  <!-- Application Layer -->
  <rect x="150" y="280" width="900" height="250" rx="10" fill="white" stroke="#dadce0" stroke-width="2"/>
  
  <!-- ADK Framework Container -->
  <rect x="180" y="310" width="840" height="200" rx="8" fill="#f1f3f4" stroke="#9aa0a6" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="600" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#5f6368">Google ADK (Agent Development Kit)</text>
  
  <!-- Hint Agent -->
  <rect x="220" y="355" width="280" height="130" rx="8" fill="url(#greenGrad)"/>
  <text x="360" y="380" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">💡 Hint Agent</text>
  <text x="360" y="405" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Model: gemini-2.5-flash-lite</text>
  <text x="360" y="425" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Non-revealing hints (&lt;15 words)</text>
  <text x="360" y="440" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Focus on core concepts</text>
  <text x="360" y="455" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• No external tools</text>
  <text x="360" y="470" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Runner: InMemoryRunner</text>
  
  <!-- Explanation Agent -->
  <rect x="700" y="355" width="280" height="130" rx="8" fill="url(#orangeGrad)"/>
  <text x="840" y="380" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">📚 Explanation Agent</text>
  <text x="840" y="405" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Model: gemini-2.5-flash-lite</text>
  <text x="840" y="425" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Detailed GCP explanations</text>
  <text x="840" y="440" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Official documentation links</text>
  <text x="840" y="455" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Tools: google_search</text>
  <text x="840" y="470" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Runner: InMemoryRunner</text>
  
  <!-- Observability -->
  <rect x="540" y="355" width="120" height="50" rx="6" fill="#fff" stroke="#9aa0a6" stroke-width="2"/>
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#202124">📊 Logging</text>
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#5f6368">LoggingPlugin</text>
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#5f6368">(Observability)</text>
  
  <!-- Data Layer -->
  <rect x="150" y="560" width="900" height="150" rx="10" fill="white" stroke="#dadce0" stroke-width="2"/>
  
  <!-- Questions CSV -->
  <rect x="250" y="590" width="200" height="80" rx="8" fill="url(#purpleGrad)"/>
  <text x="350" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📄 questions.csv</text>
  <text x="350" y="635" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Quiz questions</text>
  <text x="350" y="650" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Multiple choice options</text>
  <text x="350" y="665" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Correct answers</text>
  
  <!-- Feedback CSV -->
  <rect x="750" y="590" width="200" height="80" rx="8" fill="url(#purpleGrad)"/>
  <text x="850" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">📄 hint_feedback.csv</text>
  <text x="850" y="635" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• User feedback (👍/👎)</text>
  <text x="850" y="650" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Timestamp tracking</text>
  <text x="850" y="665" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Analytics data</text>
  
  <!-- Pandas -->
  <rect x="520" y="590" width="160" height="80" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="600" y="620" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a73e8">🐼 Pandas</text>
  <text x="600" y="640" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">DataFrame</text>
  <text x="600" y="655" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">Processing</text>
  
  <!-- External Services Layer -->
  <rect x="150" y="740" width="900" height="120" rx="10" fill="white" stroke="#dadce0" stroke-width="2"/>
  
  <!-- Google Gemini API -->
  <rect x="230" y="770" width="240" height="70" rx="8" fill="url(#blueGrad)"/>
  <text x="350" y="795" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">🤖 Google Gemini API</text>
  <text x="350" y="815" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">gemini-2.5-flash-lite</text>
  <text x="350" y="830" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Retry config: 10 attempts</text>
  
  <!-- Google Search API -->
  <rect x="730" y="770" width="240" height="70" rx="8" fill="url(#greenGrad)"/>
  <text x="850" y="795" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">🔍 Google Search</text>
  <text x="850" y="815" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Web search for GCP docs</text>
  <text x="850" y="830" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Used by Explanation Agent</text>
  
  <!-- Environment Config -->
  <rect x="530" y="770" width="140" height="70" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="600" y="795" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#f57c00">🔐 Config</text>
  <text x="600" y="815" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">.env</text>
  <text x="600" y="830" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#202124">GOOGLE_API_KEY</text>
  
  <!-- Arrows / Data Flow -->
  <!-- User to Streamlit -->
  <line x1="275" y1="170" x2="380" y2="170" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Streamlit to State -->
  <line x1="600" y1="175" x2="680" y2="175" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Streamlit to Agents -->
  <line x1="490" y1="220" x2="360" y2="355" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="220" x2="840" y2="355" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Agents to Logging -->
  <line x1="500" y1="380" x2="540" y2="380" stroke="#5f6368" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="700" y1="380" x2="660" y2="380" stroke="#5f6368" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Data to Pandas -->
  <line x1="350" y1="590" x2="520" y2="630" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="850" y1="590" x2="680" y2="630" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Pandas to Streamlit -->
  <line x1="600" y1="590" x2="550" y2="220" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Agents to External Services -->
  <line x1="360" y1="485" x2="350" y2="770" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="840" y1="485" x2="850" y2="770" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="840" y1="485" x2="850" y2="770" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Config to Agents -->
  <line x1="600" y1="770" x2="490" y2="530" stroke="#f57c00" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Key Features Box -->
  <rect x="1060" y="130" width="120" height="140" rx="6" fill="#e6f4ea" stroke="#1e8e3e" stroke-width="2"/>
  <text x="1120" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e8e3e">✨ Features</text>
  <text x="1120" y="175" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• Hint system</text>
  <text x="1120" y="190" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• AI explanations</text>
  <text x="1120" y="205" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• User feedback</text>
  <text x="1120" y="220" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• Score tracking</text>
  <text x="1120" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• State persistence</text>
  <text x="1120" y="250" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• Retry handling</text>
  <text x="1120" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#202124">• Observability</text>
</svg>